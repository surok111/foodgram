version: '3.3'
services:

  db:
    image: postgres:15-alpine
    container_name: foodgram-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env

  backend:
    container_name: foodgram-backend
    build: ../backend
    volumes:
      - static_value:/app/collected_static/
      - media_value:/app/media/
      - ../data:/app/data
    depends_on:
      - db
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py load_ingredients --path /app/data/ingredients.json &&
             gunicorn --bind 0:8000 foodgram_project.wsgi"

  frontend:
    container_name: foodgram-front
    build: ../frontend
    volumes:
      - frontend_value:/app/result_build/

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_value:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static_value:/var/html/static/
      - media_value:/var/html/media/
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_value:
  media_value:
  frontend_value:
